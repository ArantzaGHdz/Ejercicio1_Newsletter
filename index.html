<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="images/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <title>Join Our Newsletter</title>
  </head>
  <body>
    <header>
      <img src="images/logo.svg" alt="" />
      <h1>Join our newsletter</h1>
    </header>
    <div>
      <p>
        Keep up with our latest collections, exclusive deals, and special
        offers! We introduce a new collection every week, so stay tuned to snag
        the hottest items just for you.
      </p>
    </div>
    <form action="">
      <div>
        <label for="email">
          <input type="email" name="email" id="email" />
          <span>Enter your email address</span>
        </label>
        <div>
          <input type="submit" value="Subscribe now" />
        </div>
        <p>Your email is 100% confidential and won’t send you any spam.</p>
      </div>
    </form>

    <div class="author-info">Coded by <a href="#">Tu nombre aquí</a></div>
  </body>
</html>
