<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="images/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Join Our Newsletter</title>
  </head>
  <body>
    <main class="elements">
      <header class="title-card">
        <img src="images/logo.svg" alt="" />
        <h1>Join our newsletter</h1>
      </header>
      <div class="text">
        <p id="text">
          Keep up with our latest collections, exclusive deals, and special
          offers! We introduce a new collection every week, so stay tuned to
          snag the hottest items just for you.
        </p>
      </div>
      <form action="">
        <div class="email-box">
          <div class="email-input">
            <input
              type="email"
              name="email"
              placeholder="Enter your email address"
              id="email"
            />
          </div>
          <div>
            <input type="submit" value="Subscribe now" class="submit" />
          </div>
          <p class="disclaimer">
            Your email is 100% confidential and won’t send you any spam.
          </p>
        </div>
      </form>
    </main>

    <div class="author-info">
      Coded by <a href="#">Arantza Darina Gómez Hernández</a>
    </div>
  </body>
</html>
